<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>APi-iungo</title>
    <style>
      body {
        margin: 0;
        height:100%;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans",
          "Liberation Sans", sans-serif;
        background: #fff1f5; /* 淡粉背景 */
        color: rgba(17, 24, 39, 0.92); /* 深色字体 */
      }
      .wrap {
        max-width: 900px;
        margin: 0 auto;
        padding: 28px 18px;
      }
      .card {
        border: 1px solid rgba(17, 24, 39, 0.12);
        background: rgba(255, 255, 255, 0.86);
        border-radius: 14px;
        padding: 18px 18px;
      }
      a {
        color: #0ea5e9;
      }
      .muted {
        color: rgba(17, 24, 39, 0.6);
        font-size: 12px;
      }
      .links {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 12px;
      }
      .btn {
        display: inline-block;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(17, 24, 39, 0.12);
        background: rgba(255, 255, 255, 0.72);
        text-decoration: none;
        color: rgba(17, 24, 39, 0.92);
        font-size: 13px;
      }
      .btn:hover {
        background: rgba(255, 255, 255, 0.92);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>APi-iungo</h1>
        <div class="muted">Spring Boot 后端服务已启动。</div>
        <div class="links">
          <a class="btn" href="/api.html">查看 API 文档（页面版）</a>
        </div>
      </div>
    </div>
  </body>
</html>
