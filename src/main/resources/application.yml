server:
  port: 8080
  servlet:
    context-path: /
    jsp:
      init-parameters:
        development: true # JSP 热部署
  tomcat:
    uri-encoding: UTF-8 # 解决中文乱码

spring:
  # 额外配置文件（包含敏感信息，如邮箱账号）
  config:
    import: classpath:env-mail.yml

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB

  # JSP-Model2 核心：视图解析器
  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/iungoDB?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root # 你的 MySQL 账号
    password: 123456 # 你的 MySQL 密码

  # 邮件配置（使用 QQ 邮箱，用户名/密码从 env-mail.yml 读取）
  mail:
    host: smtp.qq.com
    username: ${mail.username}
    password: ${mail.password}
    port: 587
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# MyBatis 配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true # 下划线转驼峰（如 create_time → createTime）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 打印 SQL 日志（调试用）
  type-aliases-package: com.example.apiiungo.entity # 实体类别名包

dm:
  crypto:
    # 生产环境请改为高强度随机密钥，并放到安全配置中心
    key: dev-only-change-me-dm-crypto-key
    key-version: 1
